name: xArtists CI/CD Global (with Cache)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  # ==================== FRONTEND ====================
  frontend:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=moderate || true

      - name: Type Check
        run: npm run type-check || true

      - name: Lint
        run: npm run lint || true

      - name: Build Frontend
        run: npm run build

  # ==================== RUST CONTRACTS ====================
  contracts:
    runs-on: ubuntu-latest
    name: Rust Contracts Build

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/nft-staking,contracts/tro-staking
          key: ${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Security Audit (Cargo)
        run: cargo audit || true

      - name: Check Contracts
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo build --release

  # ==================== TOOLS ====================
  tools:
    runs-on: ubuntu-latest
    name: Tools Build

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Tools Dependencies
        uses: actions/cache@v4
        with:
          path: |
            tools/faucet/node_modules
            tools/tip/node_modules
            ~/.npm
          key: ${{ runner.os }}-tools-npm-${{ hashFiles('tools/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tools-npm-

      - name: Install & Build Tools
        run: |
          if [ -d "tools/faucet" ]; then npm ci --prefix tools/faucet; fi
          if [ -d "tools/tip" ]; then npm ci --prefix tools/tip; fi
          echo "Tools built successfully"
