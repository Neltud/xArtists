name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for release-please config/manifest
        run: |
          if [ ! -f release-please-config.json ] && [ ! -f .release-please-manifest.json ]; then
            echo "No release-please config or manifest found. Skipping release-please action.";
            exit 0;
          fi

      - uses: googleapis/release-please-action@v4
        with:
          # The token to use for creating releases and PRs
          token: ${{ secrets.GITHUB_TOKEN }}
          # Path to release-please config (optional but recommended)
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
